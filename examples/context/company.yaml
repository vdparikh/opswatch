incident:
  id: inc-demo
  title: Demo DNS incident
  intent: Add a CNAME record for api.example.com
  expected_action: add CNAME record in existing hosted zone
  environment: prod
  service: api

protected_domains:
  - name: example.com
    environment: prod
    owner: platform
    authoritative_zone_id: Z123456789
    risk: critical
  - name: internal.example.com
    environment: prod
    owner: infrastructure
    risk: high

aws_accounts:
  - id: "123456789012"
    name: prod
    environment: prod
    owner: platform
    risk: critical
  - id: "210987654321"
    name: staging
    environment: staging
    owner: platform
    risk: medium

services:
  - name: api
    environment: prod
    owner: application-platform
    tier: tier-0
    risk: critical

runbooks:
  - id: dns-add-cname
    title: Add API CNAME
    service: api
    environment: prod
    expected_action: add CNAME record in existing hosted zone
    allowed_actions:
      - route53.change_record
